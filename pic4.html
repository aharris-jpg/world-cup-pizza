<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; padding: 0; }
figure {
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid #E7E2D8;
  box-shadow: 0 4px 16px rgba(36,50,74,0.08);
  position: relative;
}
figure::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, #24324A, #B6842D);
  z-index: 2;
}
img { width: 100%; height: 360px; object-fit: cover; display: block; }
figcaption {
  background: #24324A;
  color: rgba(255,255,255,0.68);
  font-family: system-ui, sans-serif;
  font-size: 12px;
  padding: 9px 14px;
  line-height: 1.5;
}
</style>
</head>
<body>
<figure>
  <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1200&auto=format&fit=crop&q=80" alt="Pizza being prepared with fresh toppings on a wooden surface">
  <figcaption>Five states return zero measurable pizza delivery data. When the tournament arrives this summer, some of them will show up. Photo: Unsplash</figcaption>
</figure>
</body>
</html>
