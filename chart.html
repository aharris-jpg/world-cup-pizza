<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Search Interest Chart — Vegas Insider</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; font-family: system-ui, sans-serif; }
.wrapper { max-width: 860px; margin: 0 auto; }

.ch-header {
  background: #24324A;
  border-radius: 10px 10px 0 0;
  padding: 14px 20px;
  position: relative; overflow: hidden;
}
.ch-header::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, #B6842D 0%, #f0c060 50%, #B6842D 100%);
  background-size: 200% 100%;
  animation: shimmer 3s linear infinite;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.ch-title {
  font-family: Georgia, serif;
  font-size: clamp(12px, 1.8vw, 16px);
  color: #fff; font-weight: 700; line-height: 1.3;
}

.ch-tabs {
  display: flex; flex-wrap: wrap; gap: 8px;
  background: #fff; border: 1px solid #E7E2D8; border-top: none;
  padding: 11px 16px;
}
.tab {
  font-size: 12px; font-weight: 600; padding: 5px 16px;
  border-radius: 100px; border: 1.5px solid #E7E2D8;
  background: #fff; color: #24324A; cursor: pointer;
  transition: all 0.15s ease;
}
.tab:hover { border-color: #B6842D; color: #B6842D; }
.tab.active { background: #B6842D; border-color: #B6842D; color: #fff; }

.ch-body {
  background: #fff; border: 1px solid #E7E2D8; border-top: none;
  border-radius: 0 0 10px 10px; padding: 14px 16px 14px 0;
}

.page-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px 12px; border-bottom: 1px solid #f2ede8; margin-bottom: 12px;
}
.page-label { font-size: 12px; font-weight: 600; color: #24324A; }
.page-btns { display: flex; gap: 6px; }
.page-btn {
  font-size: 12px; font-weight: 600; padding: 4px 14px;
  border-radius: 100px; border: 1.5px solid #E7E2D8;
  background: #fff; color: #24324A; cursor: pointer;
  transition: all 0.15s ease;
}
.page-btn:hover:not(:disabled) { border-color: #B6842D; color: #B6842D; }
.page-btn:disabled { opacity: 0.3; cursor: default; }

.bar-row { display: flex; align-items: center; margin-bottom: 5px; min-height: 26px; }
.bar-rank {
  font-size: 11px; font-weight: 700; color: #aaa;
  min-width: 28px; text-align: right; padding-right: 8px; flex-shrink: 0;
}
.bar-label {
  font-size: 12px; font-weight: 500; color: #24324A;
  min-width: 128px; max-width: 128px; text-align: right;
  padding-right: 12px; flex-shrink: 0; line-height: 1.3;
}
.bar-track {
  flex: 1; height: 22px; background: #f2ede8;
  border-radius: 5px; position: relative; margin-right: 50px;
}
.bar-fill {
  height: 100%; border-radius: 5px;
  min-width: 4px; position: relative;
  transition: width 0.45s ease;
}
.bar-val-out {
  position: absolute; right: -42px; top: 50%;
  transform: translateY(-50%);
  font-size: 11px; font-weight: 700; color: #24324A; white-space: nowrap;
}
.bar-val-in {
  position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%);
  font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap;
}

.ch-bottom {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px 0; border-top: 1px solid #f0ede8; margin-top: 12px;
}
.ch-sub { font-size: 10.5px; color: #ccc; line-height: 1.5; }
.ch-logo { height: 20px; width: auto; display: block; opacity: 0.65; }

@media (max-width: 600px) {
  .bar-label { min-width: 90px; max-width: 90px; font-size: 11px; }
  .bar-rank { min-width: 22px; }
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="ch-header">
    <div class="ch-title">The States That Order the Most Pizza During the World Cup</div>
  </div>
  <div class="ch-tabs" id="tabs">
    <button class="tab active" data-view="e">Game Day Score</button>
    <button class="tab" data-view="s">Next Day Score</button>
    <button class="tab" data-view="l">Post-Game Lift</button>
  </div>
  <div class="ch-body">
    <div class="page-bar">
      <span class="page-label" id="page-label">Ranked 1 to 10</span>
      <div class="page-btns">
        <button class="page-btn" id="btn-prev" onclick="changePage(-1)" disabled>Previous 10</button>
        <button class="page-btn" id="btn-next" onclick="changePage(1)">Next 10</button>
      </div>
    </div>
    <div id="chart"></div>
    <div class="ch-bottom">
      <span class="ch-sub">Google Trends score for "pizza near me" · 8 soccer events · 2025 · Vegas Insider data study</span>
      <img class="ch-logo" src="https://s3.amazonaws.com/bctn-vi/image.png" alt="Vegas Insider" onerror="this.style.display='none'">
    </div>
  </div>
</div>

<script>
// ── DATA — matches article and map exactly ─────────────────────────────
// Sorted: event day desc, tiebreak next day desc
// l = next day minus game day (positive = day after is higher)
const DATA = [
  { n:"Rhode Island",   e:75, s:85, l:10  },
  { n:"Delaware",       e:75, s:82, l:7   },
  { n:"Ohio",           e:67, s:70, l:3   },
  { n:"South Dakota",   e:67, s:0,  l:0   },
  { n:"Pennsylvania",   e:66, s:75, l:9   },
  { n:"South Carolina", e:64, s:66, l:2   },
  { n:"Michigan",       e:63, s:73, l:10  },
  { n:"New Hampshire",  e:63, s:69, l:6   },
  { n:"Florida",        e:59, s:65, l:6   },
  { n:"West Virginia",  e:59, s:71, l:12  },
  { n:"Connecticut",    e:57, s:63, l:6   },
  { n:"DC",             e:54, s:83, l:29  },
  { n:"Maryland",       e:54, s:59, l:5   },
  { n:"Indiana",        e:52, s:57, l:5   },
  { n:"North Carolina", e:52, s:55, l:3   },
  { n:"Massachusetts",  e:51, s:59, l:8   },
  { n:"New Jersey",     e:50, s:60, l:10  },
  { n:"Illinois",       e:49, s:58, l:9   },
  { n:"Tennessee",      e:49, s:53, l:4   },
  { n:"New Mexico",     e:48, s:54, l:6   },
  { n:"Alabama",        e:47, s:49, l:2   },
  { n:"Arizona",        e:46, s:51, l:5   },
  { n:"Georgia",        e:46, s:51, l:5   },
  { n:"Kentucky",       e:45, s:49, l:4   },
  { n:"Maine",          e:45, s:59, l:14  },
  { n:"Mississippi",    e:45, s:41, l:-4  },
  { n:"Nevada",         e:44, s:45, l:1   },
  { n:"Virginia",       e:44, s:48, l:4   },
  { n:"Minnesota",      e:42, s:41, l:-1  },
  { n:"Missouri",       e:42, s:54, l:12  },
  { n:"Texas",          e:41, s:45, l:4   },
  { n:"Oklahoma",       e:40, s:49, l:9   },
  { n:"Wisconsin",      e:40, s:50, l:10  },
  { n:"Arkansas",       e:39, s:50, l:11  },
  { n:"Colorado",       e:39, s:54, l:15  },
  { n:"Louisiana",      e:39, s:42, l:3   },
  { n:"New York",       e:39, s:46, l:7   },
  { n:"Idaho",          e:38, s:50, l:12  },
  { n:"Iowa",           e:38, s:37, l:-1  },
  { n:"Nebraska",       e:37, s:40, l:3   },
  { n:"Hawaii",         e:34, s:58, l:24  },
  { n:"Montana",        e:34, s:0,  l:0   },
  { n:"Kansas",         e:33, s:39, l:6   },
  { n:"Utah",           e:33, s:41, l:8   },
  { n:"California",     e:31, s:37, l:6   },
  { n:"Oregon",         e:31, s:39, l:8   },
  { n:"Washington",     e:31, s:33, l:2   },
];

// Navy colour, opacity scales with event day score
function barColor(score) {
  if (!score || score === 0) return '#e8e3da';
  const min = 31, max = 75;
  const opacity = 0.2 + ((score - min) / (max - min)) * 0.8;
  return `rgba(36,50,74,${Math.min(1, Math.max(0.2, opacity)).toFixed(2)})`;
}

let view = 'e';
let page = 0;
const PER = 10;

function getSorted() {
  return [...DATA].sort((a, b) => {
    const va = a[view], vb = b[view];
    if (vb !== va) return vb - va;
    return b.s - a.s; // tiebreak on next day
  });
}

function getLabel(v) {
  if (view === 'l') return (v >= 0 ? '+' : '') + v + ' pts';
  return String(v);
}

function render() {
  const sorted = getSorted();
  const total  = sorted.length;
  const start  = page * PER;
  const slice  = sorted.slice(start, start + PER);
  const maxVal = Math.max(...sorted.map(d => Math.abs(d[view])), 1);

  document.getElementById('page-label').textContent =
    `Ranked ${start + 1} to ${Math.min(start + PER, total)}`;
  document.getElementById('btn-prev').disabled = page === 0;
  document.getElementById('btn-next').disabled = start + PER >= total;

  document.getElementById('chart').innerHTML = slice.map((d, i) => {
    const rank  = start + i + 1;
    const v     = d[view];
    const pct   = Math.max(0, Math.abs(v) / maxVal * 100);
    const lbl   = getLabel(v);
    const long  = pct > 28;
    const color = barColor(d.e);
    return `<div class="bar-row">
      <div class="bar-rank">${rank}</div>
      <div class="bar-label">${d.n}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${color}">
          ${long ? `<span class="bar-val-in">${lbl}</span>` : ''}
        </div>
        ${!long ? `<span class="bar-val-out">${lbl}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function changePage(dir) { page += dir; render(); }

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  view = btn.dataset.view;
  page = 0;
  render();
});

render();
</script>
</body>
</html>
